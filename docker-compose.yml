version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: neural-ops:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/neural_ops
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/neural_ops
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role
      AUTH_DEV_MODE: "false"
      ENV_VALIDATION_STRICT: "true"
      USE_MOCK_BAND: "false"
      USE_MOCK_BRIGHT_DATA: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/liveness').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: neural_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neural_ops"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
