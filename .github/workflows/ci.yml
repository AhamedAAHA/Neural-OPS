name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neural_ops?schema=neural_ops
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/neural_ops?schema=neural_ops
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role
      AIML_API_KEY: dummy-aiml-key
      BAND_API_KEY: dummy-band-key
      BAND_WORKSPACE_ID: dummy-workspace
      BAND_AGENT_SECRET: dummy-band-secret
      BRIGHT_DATA_API_KEY: dummy-bright-data
      BRIGHT_DATA_SERP_ZONE: dummy-serp
      BRIGHT_DATA_WEB_UNLOCKER_ZONE: dummy-unlocker
      SPEECHMATICS_API_KEY: dummy-speechmatics
      AUTH_DEV_MODE: "false"
      ENV_VALIDATION_STRICT: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
